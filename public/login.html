<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — eBay DDR4 RAM Scraper</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #232633; --border: #2e3245;
      --text: #e1e4ed; --text-dim: #8b90a5; --accent: #6c5ce7; --accent-hover: #7f71ed;
      --green: #00b894; --red: #e74c3c; --yellow: #fdcb6e; --blue: #74b9ff;
      --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .auth-container { width: 100%; max-width: 440px; padding: 24px; }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .brand p { font-size: 14px; color: var(--text-dim); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }

    /* Tabs */
    .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 44px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; }
    .toggle-pw:hover { color: var(--text); }

    /* Password strength */
    .pw-strength { margin-top: 8px; }
    .pw-strength-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .pw-strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .pw-strength-text { font-size: 11px; margin-top: 4px; color: var(--text-dim); }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn--primary { background: var(--accent); color: #fff; }
    .btn--primary:hover { background: var(--accent-hover); }
    .btn--primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert--error { background: rgba(231,76,60,0.12); color: var(--red); border: 1px solid rgba(231,76,60,0.25); display: block; }
    .alert--success { background: rgba(0,184,148,0.12); color: var(--green); border: 1px solid rgba(0,184,148,0.25); display: block; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { text-align: center; color: var(--text-dim); font-size: 12px; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .footer-text { text-align: center; font-size: 13px; color: var(--text-dim); margin-top: 20px; }
    .footer-text a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .footer-text a:hover { text-decoration: underline; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="brand">
    <h1>eBay DDR4 RAM Scraper</h1>
    <p>Sign in to access the deal dashboard</p>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Create Account</div>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Sign In Form -->
    <form id="signin-form" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="si-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="si-password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePassword('si-password', this)">Show</button>
        </div>
      </div>
      <button type="submit" class="btn btn--primary" id="si-btn">
        <span>Sign In</span>
      </button>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" style="display:none;" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="su-name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="su-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="su-password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePassword('su-password', this)">Show</button>
        </div>
        <div class="pw-strength" id="pw-strength" style="display:none;">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
          <div class="pw-strength-text" id="pw-text"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="su-confirm" placeholder="Re-enter password" required autocomplete="new-password">
          <button type="button" class="toggle-pw" onclick="togglePassword('su-confirm', this)">Show</button>
        </div>
      </div>
      <button type="submit" class="btn btn--primary" id="su-btn">
        <span>Create Account</span>
      </button>
    </form>
  </div>
</div>

<script>
  let sbClient = null;

  // Load Supabase config from API
  async function initSupabase() {
    try {
      const res = await fetch('/api/config');
      const cfg = await res.json();
      if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
        showAlert('Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in Vercel env vars.', 'error');
        return;
      }
      if (!window.supabase || !window.supabase.createClient) {
        showAlert('Supabase JS library failed to load. Try refreshing.', 'error');
        return;
      }
      sbClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

      // Check if already logged in
      const { data: { session } } = await sbClient.auth.getSession();
      if (session) {
        window.location.href = '/';
      }
    } catch (e) {
      showAlert('Failed to load config: ' + e.message, 'error');
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('alert').className = 'alert';
    if (tab === 'signin') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('signin-form').style.display = '';
      document.getElementById('signup-form').style.display = 'none';
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('signin-form').style.display = 'none';
      document.getElementById('signup-form').style.display = '';
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert alert--' + type;
  }

  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = 'Hide';
    } else {
      input.type = 'password';
      btn.textContent = 'Show';
    }
  }

  function checkStrength(pw) {
    const el = document.getElementById('pw-strength');
    const fill = document.getElementById('pw-fill');
    const text = document.getElementById('pw-text');
    el.style.display = pw.length > 0 ? '' : 'none';

    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { w: '20%', c: 'var(--red)', t: 'Very weak' },
      { w: '40%', c: 'var(--orange, #e17055)', t: 'Weak' },
      { w: '60%', c: 'var(--yellow)', t: 'Fair' },
      { w: '80%', c: 'var(--blue)', t: 'Strong' },
      { w: '100%', c: 'var(--green)', t: 'Very strong' },
    ];
    const level = levels[Math.min(score, 4)];
    fill.style.width = level.w;
    fill.style.background = level.c;
    text.textContent = level.t;
    text.style.color = level.c;
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>Please wait...</span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<span>' + (btnId === 'si-btn' ? 'Sign In' : 'Create Account') + '</span>';
    }
  }

  async function handleSignIn(e) {
    e.preventDefault();
    if (!sbClient) return showAlert('Supabase not initialized. Check console for errors.', 'error');

    const email = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;

    setLoading('si-btn', true);
    try {
      const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
      setLoading('si-btn', false);

      if (error) {
        showAlert(error.message, 'error');
        return;
      }

      if (data && data.session) {
        window.location.href = '/';
      } else {
        showAlert('Login succeeded but no session returned. Try again.', 'error');
      }
    } catch (err) {
      setLoading('si-btn', false);
      showAlert('Login error: ' + err.message, 'error');
    }
  }

  async function handleSignUp(e) {
    e.preventDefault();
    if (!sbClient) return showAlert('Supabase not initialized', 'error');

    const name = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;
    const confirm = document.getElementById('su-confirm').value;

    if (password !== confirm) {
      showAlert('Passwords do not match', 'error');
      return;
    }
    if (password.length < 8) {
      showAlert('Password must be at least 8 characters', 'error');
      return;
    }

    setLoading('su-btn', true);
    const { data, error } = await sbClient.auth.signUp({
      email,
      password,
      options: { data: { display_name: name } }
    });
    setLoading('su-btn', false);

    if (error) {
      showAlert(error.message, 'error');
      return;
    }

    showAlert('Account created! Check your email to confirm, then sign in.', 'success');
    setTimeout(() => switchTab('signin'), 2000);
  }

  initSupabase();
</script>
</body>
</html>
